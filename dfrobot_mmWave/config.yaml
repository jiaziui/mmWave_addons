name: DFRobot mmWave
version: 0.1.0
slug: mmwave_addons
description: DFRobot mmWave web console for Home Assistant with multi-device overview and device detail pages.
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
ingress: true
ingress_port: 42069
panel_title: DFRobot mmWave
panel_icon: mdi:radar
watchdog: "http://[HOST]:[PORT:42069]/api/health"
ports:
  42069/tcp: null
ports_description:
  42069/tcp: Optional direct access (ingress is preferred)
homeassistant_api: true
auth_api: true
hassio_api: true
stdin: true
stdin_open: true
init: false
environment:
  PORT: "42069"
options:
  port: 42069
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_client_id: "dfrobot-mmwave-addon"
schema:
  port: port
  mqtt_host: str?
  mqtt_port: port?
  mqtt_username: str?
  mqtt_password: password?
  mqtt_client_id: str?
map:
  - config:rw
