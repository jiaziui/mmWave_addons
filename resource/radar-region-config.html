<script>
        // 初始数据
        let regions = [
            { id: 1, name: '核心警戒区-A', type: 'rect', visible: true, color: '#FF6B6B', sensitivity: '高', level: '5', start: '00:00', end: '23:59', points: '150,150 450,350' },
            { id: 2, name: '外围监测区-B', type: 'polygon', visible: true, color: '#4DABF7', sensitivity: '中', level: '2', start: '08:00', end: '18:00', points: '550,100 750,150 700,350 500,300' },
            { id: 3, name: '入口环形区', type: 'circle', visible: true, color: '#69DB7C', sensitivity: '低', level: '1', start: '06:00', end: '22:00', points: '300,500 80' }
        ];

        let activeTool = 'rect';
        let selectedId = null;
        let deleteId = null;
        let isGridVisible = true;
        let isBgVisible = false;

        // 初始化
        window.onload = () => {
            renderRegions();
            updateStats();
            
            // 点击画布空白处取消选中
            document.getElementById('svgCanvas').addEventListener('click', (e) => {
                if (e.target.id === 'svgCanvas') {
                    selectRegion(null);
                } else if (e.target.dataset.id) {
                    selectRegion(parseInt(e.target.dataset.id));
                }
            });

            // 点击外部关闭菜单
            document.addEventListener('click', (e) => {
                if (!document.getElementById('menuDropdownContainer').contains(e.target)) {
                    document.getElementById('dropdownMenu').classList.remove('block');
                    document.getElementById('dropdownMenu').classList.add('hidden');
                }
            });
        };

        // 渲染所有区域
        function renderRegions() {
            const svg = document.getElementById('svgCanvas');
            const list = document.getElementById('regionListItems');
            svg.innerHTML = '';
            list.innerHTML = '';

            regions.forEach(reg => {
                if (reg.visible) {
                    // 绘制 SVG
                    let shape;
                    if (reg.type === 'rect') {
                        const pts = reg.points.split(' ');
                        const p1 = pts[0].split(',');
                        const p2 = pts[1].split(',');
                        shape = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                        shape.setAttribute("x", p1[0]);
                        shape.setAttribute("y", p1[1]);
                        shape.setAttribute("width", p2[0] - p1[0]);
                        shape.setAttribute("height", p2[1] - p1[1]);
                    } else if (reg.type === 'polygon') {
                        shape = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                        shape.setAttribute("points", reg.points);
                    } else if (reg.type === 'circle' || reg.type === 'curve') {
                        const pts = reg.points.split(' ');
                        const center = pts[0].split(',');
                        shape = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        shape.setAttribute("cx", center[0]);
                        shape.setAttribute("cy", center[1]);
                        shape.setAttribute("r", pts[1]);
                    }

                    shape.setAttribute("fill", reg.color + "44"); // 25% 不透明度
                    shape.setAttribute("stroke", reg.color);
                    shape.setAttribute("stroke-width", "2");
                    shape.setAttribute("data-id", reg.id);
                    shape.setAttribute("class", "cursor-pointer transition-all " + (selectedId === reg.id ? "shape-selected" : ""));
                    
                    // 标签
                    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    const pts = reg.points.split(' ');
                    const first = pts[0].split(',');
                    label.setAttribute("x", parseInt(first[0]) + 10);
                    label.setAttribute("y", parseInt(first[1]) + 20);
                    label.setAttribute("fill", "white");
                    label.setAttribute("class", "text-[12px] font-bold shape-label");
                    label.textContent = reg.name;
                    
                    const labelBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    labelBg.setAttribute("x", parseInt(first[0]) + 5);
                    labelBg.setAttribute("y", parseInt(first[1]) + 5);
                    labelBg.setAttribute("width", reg.name.length * 12 + 10);
                    labelBg.setAttribute("height", "20");
                    labelBg.setAttribute("fill", reg.color);
                    labelBg.setAttribute("rx", "4");
                    labelBg.setAttribute("class", "shape-label");

                    svg.appendChild(shape);
                    svg.appendChild(labelBg);
                    svg.appendChild(label);
                }

                // 渲染列表项
                const item = document.createElement('div');
                item.className = `p-4 border-b border-gray-50 flex items-center gap-3 hover:bg-blue-50 transition-colors cursor-pointer ${selectedId === reg.id ? 'bg-blue-50 border-l-4 border-l-blue-500' : ''}`;
                item.onclick = (e) => {
                    if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'ICONIFY-ICON') {
                        selectRegion(reg.id);
                    }
                };
                
                item.innerHTML = `
                    <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500">
                    <div class="flex-1 overflow-hidden">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full" style="background-color: ${reg.color}"></span>
                            <p class="text-sm font-medium text-gray-800 truncate">${reg.name}</p>
                        </div>
                        <div class="flex items-center gap-3 mt-1 text-[11px] text-gray-500">
                            <span class="bg-gray-100 px-1.5 py-0.5 rounded">灵敏度:${reg.sensitivity}</span>
                            <span>等级:${reg.level}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="toggleVisibility(${reg.id})" class="p-1 hover:bg-gray-200 rounded text-gray-500">
                            <iconify-icon icon="${reg.visible ? 'mdi:eye-outline' : 'mdi:eye-off-outline'}"></iconify-icon>
                        </button>
                        <button onclick="openEditPanel(${reg.id})" class="p-1 hover:bg-gray-200 rounded text-gray-500">
                            <iconify-icon icon="mdi:pencil-outline"></iconify-icon>
                        </button>
                        <button onclick="confirmDelete(${reg.id})" class="p-1 hover:bg-red-100 rounded text-red-400">
                            <iconify-icon icon="mdi:delete-outline"></iconify-icon>
                        </button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function updateStats() {
            document.getElementById('regionCount').textContent = regions.length;
            document.getElementById('selectedCount').textContent = selectedId ? 1 : 0;
        }

        // 交互逻辑
        function setActiveTool(tool) {
            activeTool = tool;
            const names = { rect: '矩形工具', polygon: '多边形工具', circle: '圆形工具', curve: '曲线工具' };
            document.getElementById('currentToolName').textContent = names[tool];
            
            // 切换按钮样式
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('text-[#2D4B8C]', 'bg-blue-50');
                btn.classList.add('text-gray-600');
            });
            document.getElementById('tool-' + tool).classList.add('text-[#2D4B8C]', 'bg-blue-50');
            document.getElementById('tool-' + tool).classList.remove('text-gray-600');
        }

        function selectRegion(id) {
            selectedId = id;
            renderRegions();
            updateStats();
            if (id) {
                openEditPanel(id);
            } else {
                closeEditPanel();
            }
        }

        function toggleVisibility(id) {
            const reg = regions.find(r => r.id === id);
            if (reg) {
                reg.visible = !reg.visible;
                renderRegions();
            }
        }

        function addNewRegion() {
            const id = Date.now();
            const x = Math.random() * 400 + 100;
            const y = Math.random() * 300 + 100;
            const colors = ['#FF6B6B', '#FFA94D', '#4DABF7', '#69DB7C', '#DA77F2', '#38D9A9'];
            
            let points = '';
            if (activeTool === 'rect') points = `${x},${y} ${x+200},${y+150}`;
            else if (activeTool === 'polygon') points = `${x},${y} ${x+150},${y+50} ${x+100},${y+200} ${x-50},${y+150}`;
            else points = `${x},${y} 60`;

            const newReg = {
                id: id,
                name: '新建区域-' + regions.length,
                type: activeTool,
                visible: true,
                color: colors[regions.length % colors.length],
                sensitivity: '中',
                level: '1',
                start: '08:00',
                end: '18:00',
                points: points
            };
            
            regions.push(newReg);
            selectRegion(id);
        }

        function confirmDelete(id) {
            deleteId = id;
            const reg = regions.find(r => r.id === id);
            document.getElementById('deleteTargetName').textContent = reg.name;
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('confirmModal').classList.add('flex');
        }

        function executeDelete() {
            regions = regions.filter(r => r.id !== deleteId);
            if (selectedId === deleteId) selectedId = null;
            closeConfirmModal();
            renderRegions();
            updateStats();
            closeEditPanel();
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.add('hidden');
            document.getElementById('confirmModal').classList.remove('flex');
        }

        function openEditPanel(id) {
            const reg = regions.find(r => r.id === id);
            if (!reg) return;
            
            selectedId = id;
            document.getElementById('edit-name').value = reg.name;
            document.getElementById('edit-sensitivity').value = reg.sensitivity;
            document.getElementById('edit-level').value = reg.level;
            document.getElementById('edit-start').value = reg.start;
            document.getElementById('edit-end').value = reg.end;
            
            // 设置颜色选择器状态
            const picker = document.getElementById('colorPicker');
            Array.from(picker.children).forEach(btn => {
                if (btn.style.backgroundColor.toUpperCase() === reg.color.toUpperCase() || 
                    rgbToHex(btn.style.backgroundColor).toUpperCase() === reg.color.toUpperCase()) {
                    btn.classList.add('border-blue-500', 'scale-110');
                } else {
                    btn.classList.remove('border-blue-500', 'scale-110');
                }
            });

            const panel = document.getElementById('editPanel');
            panel.classList.remove('translate-x-[120%]', 'opacity-0');
            renderRegions();
        }

        function closeEditPanel() {
            const panel = document.getElementById('editPanel');
            panel.classList.add('translate-x-[120%]', 'opacity-0');
        }

        function setEditColor(color) {
            const reg = regions.find(r => r.id === selectedId);
            if (reg) {
                reg.color = color;
                openEditPanel(selectedId);
                renderRegions();
            }
        }

        function saveEdit() {
            const reg = regions.find(r => r.id === selectedId);
            if (reg) {
                reg.name = document.getElementById('edit-name').value;
                reg.sensitivity = document.getElementById('edit-sensitivity').value;
                reg.level = document.getElementById('edit-level').value;
                reg.start = document.getElementById('edit-start').value;
                reg.end = document.getElementById('edit-end').value;
                renderRegions();
                // 模拟保存成功
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '已保存 ✓';
                btn.classList.replace('bg-[#2D4B8C]', 'bg-green-600');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.replace('bg-green-600', 'bg-[#2D4B8C]');
                }, 1500);
            }
        }

        function toggleGrid() {
            isGridVisible = !isGridVisible;
            document.getElementById('gridOverlay').classList.toggle('hidden');
            document.getElementById('tool-grid').classList.toggle('text-[#2D4B8C]');
            document.getElementById('tool-grid').classList.toggle('text-gray-600');
        }

        function toggleBackground() {
            isBgVisible = !isBgVisible;
            document.getElementById('backgroundImage').classList.toggle('hidden');
            document.getElementById('tool-bg').classList.toggle('text-[#2D4B8C]');
            document.getElementById('tool-bg').classList.toggle('text-gray-600');
        }

        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('block');
        }

        function togglePanel(type) {
            if (type === 'list') {
                const panel = document.getElementById('listPanel');
                panel.classList.toggle('-translate-x-[120%]');
                panel.classList.toggle('opacity-0');
            } else {
                if (selectedId) {
                    const panel = document.getElementById('editPanel');
                    panel.classList.toggle('translate-x-[120%]');
                    panel.classList.toggle('opacity-0');
                }
            }
        }

        // 辅助工具
        function rgbToHex(rgb) {
            if (!rgb) return "";
            if (rgb.startsWith('#')) return rgb;
            const match = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
            if (!match) return rgb;
            function hex(x) {
                return ("0" + parseInt(x).toString(16)).slice(-2);
            }
            return "#" + hex(match[1]) + hex(match[2]) + hex(match[3]);
        }
    </script>
</body>
</html>
